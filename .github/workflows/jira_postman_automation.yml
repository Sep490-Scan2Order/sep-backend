name: Postman API Test & Professional Report

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  api-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Cài đặt Newman và các bộ xuất báo cáo (HTML + CSV cho Excel)
      - name: Install Newman & Reporters
        run: npm install -g newman newman-reporter-htmlextra newman-reporter-csv

      # 4. Chạy Collection và Xuất 3 loại file: JSON, HTML và CSV (Excel)
      - name: Run All Postman Collections
        run: |
          mkdir -p TestResults
          for file in ScanToOrder.Application.UnitTest/Postman/*.postman_collection*; do
            filename=$(basename "$file")
            echo "Running $filename ..."
            newman run "$file" \
              --reporters cli,json,htmlextra,csv \
              --reporter-json-export "TestResults/${filename}_results.json" \
              --reporter-htmlextra-export "TestResults/${filename}_report.html" \
              --reporter-csv-export "TestResults/${filename}_excel_report.csv" \
              --insecure || true
          done

      # 5. Script Update Jira (Giữ nguyên logic của bạn)
      - name: Dynamic Update Jira
        shell: pwsh
        run: |
          $results = Get-ChildItem "TestResults/*_results.json"
          if ($null -eq $results) { exit 0 }

          foreach ($file in $results) {
              $report = Get-Content $file.FullName -Raw | ConvertFrom-Json
              foreach ($execution in $report.run.executions) {
                  $testName = $execution.item.name
                  if ($testName -match "\[(SCRUM-\d+)\]") {
                      $issueKey = $Matches[1]
                      $failedCount = ($execution.assertions | Where-Object { $_.errorCount -gt 0 }).Count
                      $status = if ($failedCount -eq 0) { "✅ PASS" } else { "❌ FAIL" }
                      
                      $pair = "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}"
                      $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
                      
                      $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      $plainText = "h1. 🤖 POSTMAN REPORT: $testName`n*Kết quả*: $status`n*Chi tiết báo cáo*: [Xem tại GitHub Actions|$runUrl]`n*API*: https://api.scan2order.io.vn"
                      
                      $jsonBody = @{ body = $plainText } | ConvertTo-Json -Compress
                      curl -X POST "https://fpt-team-cijvpo93.atlassian.net/rest/api/2/issue/$issueKey/comment" `
                        -H "Authorization: Basic $auth" -H "Content-Type: application/json" -d $jsonBody
                  }
              }
          }

      # 6. XUẤT TẤT CẢ FILE BÁO CÁO (HTML + EXCEL)
      - name: Upload All Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: Professional-API-Test-Reports
          path: |
            TestResults/*.html
            TestResults/*.csv
          retention-days: 14
