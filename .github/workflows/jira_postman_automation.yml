name: Postman API Smart Testing

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ScanToOrder.Application.UnitTest/Postman/**'
  
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Nhập tên file muốn test (Ví dụ: Auth_Automation.postman_collection.json). Nhập "all" để chạy tất cả.'
        required: true
        default: 'all'
        type: string
      test_folder:
        description: 'Tên Folder cụ thể (ví dụ: Staff_Forgot_Pw_Flow). Để "all" nếu muốn chạy hết file.'
        required: true
        default: 'all'
jobs:
  api-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Newman & Reporters
        run: npm install -g newman newman-reporter-htmlextra newman-reporter-csv

      # BƯỚC THÔNG MINH: Tự động quét và chạy
      - name: Execute Postman Collections
        run: |
          COLLECTION_DIR="ScanToOrder.Application.UnitTest/Postman"
          FILE="${{ github.event.inputs.test_scope }}"
          FOLDER="${{ github.event.inputs.test_folder }}"
      
          if [[ "$FILE" != "all" ]]; then
             # Nếu có chỉ định Folder
             if [[ "$FOLDER" != "all" ]]; then
                echo "🚀 Chạy Folder [$FOLDER] trong file [$FILE]"
                newman run "$COLLECTION_DIR/$FILE" --folder "$FOLDER" --reporters cli,json,htmlextra,csv --insecure || true
             else
                echo "📂 Chạy toàn bộ file [$FILE]"
                newman run "$COLLECTION_DIR/$FILE" --reporters cli,json,htmlextra,csv --insecure || true
             fi
          else
             # Chạy tất cả nếu là Push hoặc chọn 'all'
             for f in "$COLLECTION_DIR"/*.json; do
                newman run "$f" --reporters cli,json,htmlextra,csv --insecure || true
             done
          fi

      # 5. Script Update Jira (Giữ nguyên logic PowerShell của bạn)
      - name: Dynamic Update Jira
        shell: pwsh
        run: |
          $results = Get-ChildItem "TestResults/*_results.json"
          if ($null -eq $results) { exit 0 }
          foreach ($file in $results) {
              $report = Get-Content $file.FullName -Raw | ConvertFrom-Json
              foreach ($execution in $report.run.executions) {
                  $testName = $execution.item.name
                  if ($testName -match "\[(SCRUM-\d+)\]") {
                      $issueKey = $Matches[1]
                      $failedCount = ($execution.assertions | Where-Object { $_.errorCount -gt 0 }).Count
                      $status = if ($failedCount -eq 0) { "✅ PASS" } else { "❌ FAIL" }
                      $pair = "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}"
                      $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
                      $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      $plainText = "h1. 🤖 POSTMAN REPORT: $testName`n*Kết quả*: $status`n*Chi tiết*: [Xem tại GitHub|$runUrl]`n*API*: https://api.scan2order.io.vn"
                      $jsonBody = @{ body = $plainText } | ConvertTo-Json -Compress
                      curl -X POST "https://fpt-team-cijvpo93.atlassian.net/rest/api/2/issue/$issueKey/comment" `
                        -H "Authorization: Basic $auth" -H "Content-Type: application/json" -d $jsonBody
                  }
              }
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Professional-Reports
          path: TestResults/
