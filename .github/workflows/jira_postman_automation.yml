name: Postman API Test & Jira Update

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  api-testing:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout mã nguồn từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Cài đặt Node.js để chạy Newman
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Cài đặt Newman (Postman CLI)
      - name: Install Newman
        run: npm install -g newman

     # 4. Chạy Test Postman
      - name: Run Postman Collection
        run: |
          newman run "ScanToOrder.Application.UnitTest/Postman/Scan2Order_Automation.postman_collection" \
          --reporters cli,json \
          --reporter-json-export ScanToOrder.Application.UnitTest/Postman/test_results.json \
          --insecure

      # 5. Script Update Jira (Giữ nguyên như cũ nhưng bỏ phần kiểm tra File để tránh lỗi Exit 1)
      - name: Dynamic Update Jira
        shell: pwsh
        run: |
          $reportFile = "ScanToOrder.Application.UnitTest/Postman/test_results.json"
          if (!(Test-Path $reportFile)) { exit 0 }

          $report = Get-Content $reportFile -Raw | ConvertFrom-Json
          
          foreach ($execution in $report.run.executions) {
              $testName = $execution.item.name
              if ($testName -match "\[(SCRUM-\d+)\]") {
                  $issueKey = $Matches[1]
                  Write-Host "🚀 Đang gửi kết quả (Markdown) cho Ticket: $issueKey"

                  # Cấu hình Auth
                  $pair = "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}"
                  $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
                  
                  # Nội dung cực kỳ đơn giản (Markdown)
                  $plainText = "h1. 🤖 POSTMAN REPORT: $testName\n*Kết quả*: Đã hoàn thành kiểm thử.\n*API*: https://api.scan2order.io.vn"
                  
                  # Tạo JSON body bằng cách ghép chuỗi thủ công để tránh lỗi encoding
                  $jsonBody = "{ `"body`": `"$plainText`" }"

                  # Gọi API v2 (v2 dễ tính hơn v3 rất nhiều)
                  $uri = "https://fpt-team-cijvpo93.atlassian.net/rest/api/2/issue/$issueKey/comment"

                  curl -X POST $uri `
                    -H "Authorization: Basic $auth" `
                    -H "Content-Type: application/json" `
                    -d $jsonBody
                  
                  Write-Host "`n------------------------------------"
              }
          }
