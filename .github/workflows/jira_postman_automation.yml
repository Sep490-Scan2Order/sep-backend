name: Postman API Test & Jira Update

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  api-testing:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout mã nguồn từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Cài đặt Node.js để chạy Newman
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Cài đặt Newman (Postman CLI)
      - name: Install Newman
        run: npm install -g newman

     # 4. Chạy Test Postman
      - name: Run Postman Collection
        run: |
          newman run "ScanToOrder.Application.UnitTest/Postman/Scan2Order_Automation.postman_collection" \
          --reporters cli,json \
          --reporter-json-export ScanToOrder.Application.UnitTest/Postman/test_results.json \
          --insecure

      # 5. Script Update Jira (Giữ nguyên như cũ nhưng bỏ phần kiểm tra File để tránh lỗi Exit 1)
      - name: Dynamic Update Jira
        shell: pwsh
        run: |
          $reportFile = "ScanToOrder.Application.UnitTest/Postman/test_results.json"
          if (!(Test-Path $reportFile)) { exit 0 }

          $report = Get-Content $reportFile -Raw | ConvertFrom-Json
          
          foreach ($execution in $report.run.executions) {
              $testName = $execution.item.name
              if ($testName -match "\[(SCRUM-\d+)\]") {
                  $issueKey = $Matches[1]
                  Write-Host "🚀 Đang xử lý Ticket: $issueKey"

                  $failedCount = ($execution.assertions | Where-Object { $_.errorCount -gt 0 }).Count
                  $status = if ($failedCount -eq 0) { "✅ PASS" } else { "❌ FAIL" }
                  
                  # Body chuẩn ADF (Atlassian Document Format)
                  $commentObj = @{
                      version = 1
                      type    = "doc"
                      content = @(
                          @{
                              type = "paragraph"
                              content = @(
                                  @{ type = "text"; text = "🤖 POSTMAN AUTOMATION REPORT`n"; marks = @(@{ type = "strong" }) },
                                  @{ type = "text"; text = "Bài test: $testName`n" },
                                  @{ type = "text"; text = "Kết quả: $status`nAPI: https://api.scan2order.io.vn" }
                              )
                          }
                      )
                  }

                  # Chuyển Object sang JSON string
                  $jsonBody = $commentObj | ConvertTo-Json -Depth 10 -Compress
                  
                  # Cấu hình Auth
                  $pair = "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}"
                  $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))

                  try {
                      $uri = "https://fpt-team-cijvpo93.atlassian.net/rest/api/3/issue/$issueKey/comment"
                      # Gửi trực tiếp bằng -Body $jsonBody, PowerShell Core sẽ tự xử lý UTF8
                      Invoke-RestMethod -Method Post -Uri $uri `
                        -Headers @{ 
                            Authorization = "Basic $auth"
                            "Content-Type" = "application/json"
                            "Accept" = "application/json"
                        } `
                        -Body $jsonBody
                      Write-Host "✅ Gửi thành công cho $issueKey"
                  } catch {
                      Write-Host "❌ Thất bại tại $issueKey"
                      # Cách đọc lỗi chuẩn cho HttpResponseMessage
                      if ($_.Exception.InnerException) {
                          Write-Host "Lỗi chi tiết: $($_.Exception.InnerException.Message)"
                      }
                      # Thử đọc nội dung phản hồi lỗi từ Jira nếu có
                      $response = $_.Exception.Response
                      if ($null -ne $response) {
                          $content = $response.Content.ReadAsStringAsync().Result
                          Write-Host "Phản hồi từ Jira: $content"
                      }
                  }
              }
          }
